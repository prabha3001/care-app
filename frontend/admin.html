<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page page-wide" id="login-view">
    <h1>Admin Login</h1>
    <p class="subtitle">Manage carers, clients, and the rota.</p>

    <form id="admin-login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />

      <div class="error" id="login-error"></div>

      <button type="submit" id="login-button">Log In</button>
    </form>
  </div>

  <div class="page page-wide" id="dashboard-view" style="display:none;">
    <div class="top-bar">
      <h1>Admin</h1>
      <button class="secondary" id="logout-button">Log Out</button>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2>Add Carer</h2>
        <form id="add-carer-form">
          <label for="carer-name">Name</label>
          <input type="text" id="carer-name" required />

          <label for="carer-email">Email</label>
          <input type="email" id="carer-email" required />

          <label for="carer-password">Password</label>
          <input type="text" id="carer-password" required />

          <div class="error" id="carer-error"></div>

          <button type="submit">Add Carer</button>
        </form>
      </div>

      <div class="card">
        <h2>Add Client</h2>
        <form id="add-client-form">
          <label for="client-name">Name</label>
          <input type="text" id="client-name" required />

          <label for="client-address">Address</label>
          <input type="text" id="client-address" />

          <label for="client-phone">Phone</label>
          <input type="text" id="client-phone" />

          <div class="error" id="client-error"></div>

          <button type="submit">Add Client</button>
        </form>
      </div>
    </div>

    <div class="card">
      <h2>Schedule a Visit</h2>
      <form id="add-visit-form">
        <label for="visit-carer">Carer</label>
        <select id="visit-carer" required></select>

        <label for="visit-client">Client</label>
        <select id="visit-client" required></select>

        <label for="visit-start">Start</label>
        <input type="datetime-local" id="visit-start" required />

        <label for="visit-end">End</label>
        <input type="datetime-local" id="visit-end" required />

        <div class="error" id="visit-error"></div>

        <button type="submit">Add to Rota</button>
      </form>
    </div>

    <div class="card">
      <h2>Rota</h2>
      <div id="rota-table"></div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
